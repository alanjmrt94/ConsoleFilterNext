modLoader="javafml"
loaderVersion="[47,)"
license="CC BY-NC-SA 4.0"
issueTrackerURL="https://github.com/alanjmrt94/ConsoleFilterNext/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
credits="Fork of ConsoleFilter by Matthew Czyr (MattCzyr). Original contributors: NgLoader, MarkKoz, ChaosTheDude."
description='''${mod_description}'''
# Environment: ${mod_environment} — client and dedicated server
displayTest="IGNORE_ALL_VERSION"
logoFile="icon.png"

[[dependencies.minecraft]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.forge]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="AFTER"
side="BOTH"