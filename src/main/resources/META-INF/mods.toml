modLoader="javafml"
loaderVersion="[47,)"
license="CC BY-NC-SA 4.0"
issueTrackerURL="https://github.com/alanjmrt94/ConsoleFilterNext/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
credits="Originally based on ConsoleFilter by Matthew Czyr (MattCzyr). Contributors: NgLoader, MarkKoz, ChaosTheDude. Maintained by alanjmrt94. CC BY-NC-SA 4.0."
description='''${mod_description}'''
modUrl="https://www.curseforge.com/minecraft/mc-mods/consolefilternext"
# Environment: ${mod_environment} — client and dedicated server
displayTest="IGNORE_ALL_VERSION"
logoFile="icon.png"

[[dependencies.minecraft]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.forge]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="AFTER"
side="BOTH"

# Mod Menu is Fabric-only. Forge clients use Options -> Mods -> Config (ForgeConfigSpec UI)
# and the optional ConfigScreenFactory registered by this mod.